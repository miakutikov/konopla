{{ define "main" }}
<div class="container">
<div id="cat-app">

  <!-- Auth screen -->
  <div id="cat-auth" class="admin-auth">
    <div class="auth-card">
      <h1>🔐 Каталог — Адмін</h1>
      <p>Введіть пароль для доступу</p>
      <form id="cat-auth-form">
        <input type="password" id="cat-auth-key" placeholder="Пароль" autocomplete="off" class="auth-input">
        <button type="submit" class="auth-btn">Увійти</button>
      </form>
      <p id="cat-auth-error" class="auth-error" style="display:none">Невірний пароль</p>
    </div>
  </div>

  <!-- Main panel -->
  <div id="cat-panel" style="display:none">

    <div class="admin-header">
      <h1>📋 Каталог компаній</h1>
      <div class="admin-actions-top">
        <button class="admin-btn admin-btn-green" onclick="showCompanyForm()">+ Додати компанію</button>
        <button class="admin-btn" onclick="loadCatalog()">🔄 Оновити</button>
        <button class="admin-btn" onclick="triggerDeploy()">🚀 Деплой</button>
        <a href="/admin/" class="admin-btn admin-btn-dim">← Назад до адміну</a>
        <button class="admin-btn admin-btn-dim" onclick="catLogout()">Вийти</button>
      </div>
    </div>

    <div id="cat-status" class="admin-status" style="display:none;position:relative;z-index:10000"></div>

    <!-- PAT setup -->
    <div id="cat-pat-setup" class="pat-setup" style="display:none">
      <p>⚠️ Потрібен GitHub Token для збереження змін.</p>
      <input type="password" id="cat-pat-input" placeholder="GitHub Personal Access Token" class="auth-input">
      <button class="admin-btn admin-btn-green" onclick="saveToken()">Зберегти токен</button>
    </div>

    <!-- Filters -->
    <div class="cat-filters">
      <input type="text" id="cat-search" placeholder="🔍 Пошук компанії..." oninput="renderCompanies()" class="cat-search-input">
      <select id="cat-filter-cat" onchange="renderCompanies()" class="cat-select">
        <option value="all">Всі категорії</option>
      </select>
      <select id="cat-filter-region" onchange="renderCompanies()" class="cat-select">
        <option value="all">Всі регіони</option>
      </select>
      <select id="cat-filter-status" onchange="renderCompanies()" class="cat-select">
        <option value="all">Всі статуси</option>
        <option value="active">Активні</option>
        <option value="inactive">Неактивні</option>
      </select>
      <span id="cat-count" class="cat-count">0 компаній</span>
    </div>

    <!-- Company form (hidden) -->
    <div id="company-form" class="company-form-wrap" style="display:none">
      <div class="company-form-card">
        <div class="company-form-header">
          <h2 id="form-title">✍️ Нова компанія</h2>
          <button class="admin-btn admin-btn-dim" onclick="hideCompanyForm()">✕ Закрити</button>
        </div>

        <div class="cf-row">
          <div class="cf-field cf-field-wide">
            <label>Назва *</label>
            <input type="text" id="cf-name" placeholder="Назва компанії" oninput="autoSlug()">
          </div>
          <div class="cf-field">
            <label>Slug (URL)</label>
            <input type="text" id="cf-slug" placeholder="nazva-kompaniyi">
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field">
            <label>Категорія *</label>
            <select id="cf-category"></select>
          </div>
          <div class="cf-field">
            <label>Регіон *</label>
            <select id="cf-region"></select>
          </div>
          <div class="cf-field">
            <label>Місто / Адреса</label>
            <input type="text" id="cf-location" placeholder="Київ, вул. Хрещатик 1">
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field">
            <label>Координати — Широта</label>
            <input type="number" id="cf-lat" placeholder="50.4501" step="0.0001">
          </div>
          <div class="cf-field">
            <label>Координати — Довгота</label>
            <input type="number" id="cf-lng" placeholder="30.5234" step="0.0001">
          </div>
          <div class="cf-field">
            <label>Рік заснування</label>
            <input type="number" id="cf-founded" placeholder="2015" min="1800" max="2030">
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field cf-field-wide">
            <label>Короткий опис *</label>
            <textarea id="cf-description" rows="3" placeholder="Короткий опис компанії (до 300 символів)..."></textarea>
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field cf-field-wide">
            <label>Повний опис</label>
            <textarea id="cf-full-desc" rows="5" placeholder="Повний опис компанії для сторінки компанії..."></textarea>
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field">
            <label>Веб-сайт</label>
            <input type="url" id="cf-website" placeholder="https://example.com">
          </div>
          <div class="cf-field">
            <label>Телефон</label>
            <input type="tel" id="cf-phone" placeholder="+380 44 1234567">
          </div>
          <div class="cf-field">
            <label>Email</label>
            <input type="email" id="cf-email" placeholder="info@example.com">
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field">
            <label>Telegram</label>
            <input type="text" id="cf-telegram" placeholder="@channel або https://t.me/...">
          </div>
          <div class="cf-field">
            <label>Instagram</label>
            <input type="text" id="cf-instagram" placeholder="@handle або URL">
          </div>
          <div class="cf-field">
            <label>Facebook</label>
            <input type="text" id="cf-facebook" placeholder="URL сторінки">
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field">
            <label>Логотип (URL або завантажити)</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" id="cf-logo" placeholder="/images/catalog/logo.png" style="flex:1">
              <label class="cf-upload-btn" title="Завантажити логотип (max 2MB)">
                📷
                <input type="file" id="cf-logo-upload" accept="image/jpeg,image/png,image/webp,image/svg+xml" style="display:none" onchange="uploadLogo(this)">
              </label>
            </div>
            <div id="cf-logo-preview" style="display:none;margin-top:8px">
              <img id="cf-logo-preview-img" src="" alt="Logo" style="max-height:60px;border-radius:6px;">
            </div>
          </div>
          <div class="cf-field">
            <label>Теги (через кому)</label>
            <input type="text" id="cf-tags" placeholder="DevoHome, текстиль, конопляна тканина">
          </div>
          <div class="cf-field">
            <label>Продукти/послуги (через кому)</label>
            <input type="text" id="cf-products" placeholder="волокно, костра, насіння">
          </div>
        </div>

        <div class="cf-row">
          <div class="cf-field">
            <label>Статус</label>
            <select id="cf-status">
              <option value="active">Активна</option>
              <option value="inactive">Неактивна</option>
            </select>
          </div>
          <div class="cf-field" style="display:flex;align-items:flex-end;padding-bottom:4px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
              <input type="checkbox" id="cf-featured" style="width:18px;height:18px">
              ⭐ Виділена компанія
            </label>
          </div>
        </div>

        <div class="cf-actions">
          <button class="admin-btn admin-btn-green cf-submit-btn" onclick="saveCompany()">💾 Зберегти</button>
          <button class="admin-btn admin-btn-dim" onclick="hideCompanyForm()">Скасувати</button>
          <span id="form-editing-id" style="display:none"></span>
        </div>
      </div>
    </div>

    <!-- Companies list -->
    <div id="companies-list">
      <div class="loading">Завантаження каталогу...</div>
    </div>

  </div><!-- /cat-panel -->
</div><!-- /cat-app -->
</div><!-- /container -->

<script>
(function() {

var ADMIN_KEY_HASH = '{{ .Site.Params.admin_key_hash }}';
var GITHUB_REPO   = '{{ .Site.Params.github_repo }}';
var catKey = '';
var catToken = '';
var catalog = null;
var catalogSha = '';
var editingId = null;

/* ---- Utils ---- */
async function sha256(msg) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function b64Encode(str) {
  var bytes = new TextEncoder().encode(str);
  var bin = Array.from(bytes).map(b => String.fromCharCode(b)).join('');
  return btoa(bin);
}
function b64Decode(str) {
  var bin = atob(str.replace(/\s/g,''));
  var bytes = new Uint8Array(bin.length);
  for (var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
function showStatus(msg, type) {
  var el = document.getElementById('cat-status');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(239,68,68,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.color = type === 'error' ? '#ef4444' : 'var(--green-accent)';
  el.style.border = '1px solid ' + (type === 'error' ? 'rgba(239,68,68,0.3)' : 'rgba(52,211,153,0.3)');
  el.style.borderRadius = 'var(--radius)';
  el.style.padding = '10px 16px';
  el.style.marginBottom = '16px';
  if (type !== 'error') setTimeout(function(){ el.style.display='none'; }, 4000);
}
function slugify(text) {
  var map = {а:'a',б:'b',в:'v',г:'h',ґ:'g',д:'d',е:'e',є:'ye',ж:'zh',з:'z',и:'y',і:'i',ї:'yi',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'kh',ц:'ts',ч:'ch',ш:'sh',щ:'shch',ь:'',ю:'yu',я:'ya',"\u02BC":'',"\u0027":''};
  return text.toLowerCase().split('').map(function(c){ return map[c]||(/[a-z0-9]/.test(c)?c:'-'); }).join('').replace(/-+/g,'-').replace(/^-|-$/g,'');
}

/* ---- Auth ---- */
document.getElementById('cat-auth-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var key = document.getElementById('cat-auth-key').value.trim();
  var hash = await sha256(key);
  if (hash === ADMIN_KEY_HASH) {
    catKey = key;
    localStorage.setItem('konopla_admin_key', key);
    document.getElementById('cat-auth').style.display = 'none';
    document.getElementById('cat-panel').style.display = 'block';
    catToken = localStorage.getItem('konopla_gh_token') || '';
    if (!catToken) document.getElementById('cat-pat-setup').style.display = 'flex';
    init();
  } else {
    document.getElementById('cat-auth-error').style.display = 'block';
  }
});

window.saveToken = function() {
  var t = document.getElementById('cat-pat-input').value.trim();
  if (!t) return;
  catToken = t;
  localStorage.setItem('konopla_gh_token', t);
  document.getElementById('cat-pat-setup').style.display = 'none';
  showStatus('✅ Токен збережено', 'ok');
};

window.catLogout = function() {
  localStorage.removeItem('konopla_admin_key');
  location.reload();
};

/* ---- GitHub API ---- */
async function ghApi(method, path, body) {
  var opts = {
    method: method,
    headers: {
      'Authorization': 'Bearer ' + catToken,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    }
  };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  var res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + path, opts);
  if (!res.ok) {
    var err = await res.json().catch(function(){ return {}; });
    throw new Error(err.message || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

/* ---- Load catalog ---- */
window.loadCatalog = async function() {
  try {
    showStatus('⏳ Завантаження...', 'ok');
    var data = await ghApi('GET', '/contents/data/catalog.json');
    catalogSha = data.sha;
    catalog = JSON.parse(b64Decode(data.content));
    populateSelects();
    renderCompanies();
    document.getElementById('cat-status').style.display = 'none';
  } catch(e) {
    showStatus('❌ Помилка завантаження: ' + e.message, 'error');
  }
};

async function saveCatalog(msg) {
  if (!catToken) { showStatus('❌ Потрібен GitHub Token', 'error'); return false; }
  try {
    showStatus('⏳ Збереження...', 'ok');
    var res = await ghApi('PUT', '/contents/data/catalog.json', {
      message: msg || '📋 Update catalog',
      content: b64Encode(JSON.stringify(catalog, null, 2)),
      sha: catalogSha
    });
    catalogSha = res.content.sha;
    showStatus('✅ Збережено', 'ok');
    return true;
  } catch(e) {
    showStatus('❌ Помилка збереження: ' + e.message, 'error');
    return false;
  }
}

/* ---- Populate selects ---- */
function populateSelects() {
  if (!catalog) return;

  var catSel = document.getElementById('cat-filter-cat');
  var regSel = document.getElementById('cat-filter-region');
  var cfCat  = document.getElementById('cf-category');
  var cfReg  = document.getElementById('cf-region');

  catSel.innerHTML = '<option value="all">Всі категорії</option>';
  cfCat.innerHTML  = '<option value="">— Оберіть категорію —</option>';
  catalog.categories.sort(function(a,b){ return a.order - b.order; }).forEach(function(c) {
    catSel.innerHTML += '<option value="' + c.id + '">' + c.emoji + ' ' + c.name + '</option>';
    cfCat.innerHTML  += '<option value="' + c.id + '">' + c.emoji + ' ' + c.name + '</option>';
  });

  regSel.innerHTML = '<option value="all">Всі регіони</option>';
  cfReg.innerHTML  = '<option value="">— Оберіть регіон —</option>';
  catalog.regions.forEach(function(r) {
    regSel.innerHTML += '<option value="' + r.id + '">' + r.name + '</option>';
    cfReg.innerHTML  += '<option value="' + r.id + '">' + r.name + '</option>';
  });
}

/* ---- Render companies ---- */
window.renderCompanies = function() {
  if (!catalog) return;

  var search  = (document.getElementById('cat-search').value || '').toLowerCase();
  var catF    = document.getElementById('cat-filter-cat').value;
  var regF    = document.getElementById('cat-filter-region').value;
  var statF   = document.getElementById('cat-filter-status').value;

  var companies = catalog.companies.filter(function(c) {
    if (catF !== 'all' && c.category_id !== catF) return false;
    if (regF !== 'all' && c.region !== regF) return false;
    if (statF !== 'all' && c.status !== statF) return false;
    if (search && !(c.name.toLowerCase().includes(search) || (c.description||'').toLowerCase().includes(search) || (c.location||'').toLowerCase().includes(search))) return false;
    return true;
  });

  document.getElementById('cat-count').textContent = companies.length + ' компаній';

  /* Group by category */
  var catMap = {};
  catalog.categories.forEach(function(c){ catMap[c.id] = c; });
  var grouped = {};
  companies.forEach(function(c) {
    var key = c.category_id;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(c);
  });

  var html = '';
  catalog.categories.forEach(function(cat) {
    if (!grouped[cat.id] || !grouped[cat.id].length) return;
    var list = grouped[cat.id];
    html += '<div class="cat-company-group">';
    html += '<div class="cat-group-title">' + cat.emoji + ' ' + cat.name + ' <span class="cat-group-count">' + list.length + '</span></div>';
    html += '<table class="cat-company-table"><thead><tr><th>Назва</th><th>Регіон</th><th>Теги</th><th>Статус</th><th>Дії</th></tr></thead><tbody>';
    list.forEach(function(c) {
      var regName = '';
      if (catalog.regions) {
        var r = catalog.regions.find(function(x){ return x.id === c.region; });
        regName = r ? r.short : (c.location || '');
      }
      var tagsHtml = (c.tags||[]).slice(0,3).map(function(t){ return '<span class="cat-tag">' + t + '</span>'; }).join('');
      var statusHtml = c.status === 'active'
        ? '<span class="cat-badge-active">● Активна</span>'
        : '<span class="cat-badge-inactive">○ Неактивна</span>';
      var featured = c.featured ? ' ⭐' : '';
      html += '<tr>';
      html += '<td><div class="cat-company-name">' + c.name + featured + '</div><div class="cat-company-location">📍 ' + (c.location||'') + '</div></td>';
      html += '<td>' + regName + '</td>';
      html += '<td><div class="cat-company-tags">' + tagsHtml + '</div></td>';
      html += '<td>' + statusHtml + '</td>';
      html += '<td><div class="cat-actions"><button class="cat-btn-edit" onclick="editCompany(\'' + c.id + '\')">✏️ Ред.</button><button class="cat-btn-delete" onclick="deleteCompany(\'' + c.id + '\',\'' + c.name.replace(/'/g,"\\'") + '\')">🗑️</button></div></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  });

  if (!html) html = '<div style="padding:40px;text-align:center;color:var(--text-tertiary)">Нічого не знайдено</div>';
  document.getElementById('companies-list').innerHTML = html;
};

/* ---- Company form ---- */
window.showCompanyForm = function(id) {
  editingId = id || null;
  document.getElementById('form-title').textContent = id ? '✏️ Редагування компанії' : '✍️ Нова компанія';
  document.getElementById('form-editing-id').textContent = id || '';

  if (id && catalog) {
    var c = catalog.companies.find(function(x){ return x.id===id; });
    if (!c) return;
    document.getElementById('cf-name').value       = c.name || '';
    document.getElementById('cf-slug').value       = c.slug || '';
    document.getElementById('cf-category').value   = c.category_id || '';
    document.getElementById('cf-region').value     = c.region || '';
    document.getElementById('cf-location').value   = c.location || '';
    document.getElementById('cf-lat').value        = (c.coordinates && c.coordinates[0]) || '';
    document.getElementById('cf-lng').value        = (c.coordinates && c.coordinates[1]) || '';
    document.getElementById('cf-founded').value    = c.founded_year || '';
    document.getElementById('cf-description').value    = c.description || '';
    document.getElementById('cf-full-desc').value  = c.full_description || '';
    document.getElementById('cf-website').value    = c.website || '';
    document.getElementById('cf-phone').value      = c.phone || '';
    document.getElementById('cf-email').value      = c.email || '';
    document.getElementById('cf-telegram').value   = (c.social && c.social.telegram) || '';
    document.getElementById('cf-instagram').value  = (c.social && c.social.instagram) || '';
    document.getElementById('cf-facebook').value   = (c.social && c.social.facebook) || '';
    document.getElementById('cf-logo').value       = c.logo || '';
    document.getElementById('cf-tags').value       = (c.tags||[]).join(', ');
    document.getElementById('cf-products').value   = (c.products||[]).join(', ');
    document.getElementById('cf-status').value     = c.status || 'active';
    document.getElementById('cf-featured').checked = !!c.featured;
    updateLogoPreview(c.logo);
  } else {
    ['cf-name','cf-slug','cf-location','cf-lat','cf-lng','cf-description','cf-full-desc',
     'cf-website','cf-phone','cf-email','cf-telegram','cf-instagram','cf-facebook','cf-logo','cf-tags','cf-products']
    .forEach(function(id){ document.getElementById(id).value=''; });
    document.getElementById('cf-founded').value = '';
    document.getElementById('cf-category').value = '';
    document.getElementById('cf-region').value = '';
    document.getElementById('cf-status').value = 'active';
    document.getElementById('cf-featured').checked = false;
    updateLogoPreview('');
  }

  document.getElementById('company-form').style.display = 'block';
  document.getElementById('company-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
};

window.hideCompanyForm = function() {
  document.getElementById('company-form').style.display = 'none';
  editingId = null;
};

window.editCompany = function(id) { showCompanyForm(id); };

window.autoSlug = function() {
  if (editingId) return;
  var name = document.getElementById('cf-name').value;
  document.getElementById('cf-slug').value = slugify(name);
};

function updateLogoPreview(url) {
  var prev = document.getElementById('cf-logo-preview');
  var img  = document.getElementById('cf-logo-preview-img');
  if (url) { img.src = url; prev.style.display = 'block'; }
  else { prev.style.display = 'none'; }
}

document.getElementById('cf-logo').addEventListener('input', function() {
  updateLogoPreview(this.value);
});

/* ---- Logo upload ---- */
window.uploadLogo = async function(fileInput) {
  var file = fileInput.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showStatus('❌ Файл занадто великий (max 2MB)', 'error'); return; }
  if (!catToken) { showStatus('❌ Потрібен GitHub Token', 'error'); return; }
  var ext = file.name.split('.').pop().toLowerCase();
  if (!['jpg','jpeg','png','webp','svg'].includes(ext)) { showStatus('❌ Тільки JPG, PNG, WebP або SVG', 'error'); return; }
  showStatus('⏳ Завантаження логотипу...', 'ok');
  var reader = new FileReader();
  reader.onload = async function(ev) {
    try {
      var base64 = ev.target.result.split(',')[1];
      var filename = 'logo-' + Date.now().toString(36) + '.' + ext;
      await ghApi('PUT', '/contents/static/images/catalog/' + filename, {
        message: '📷 Upload company logo: ' + filename,
        content: base64
      });
      var url = '/images/catalog/' + filename;
      document.getElementById('cf-logo').value = url;
      updateLogoPreview(url);
      showStatus('✅ Логотип завантажено', 'ok');
    } catch(e) {
      showStatus('❌ Помилка завантаження: ' + e.message, 'error');
    }
  };
  reader.readAsDataURL(file);
};

/* ---- Save company ---- */
window.saveCompany = async function() {
  var name = document.getElementById('cf-name').value.trim();
  var cat  = document.getElementById('cf-category').value;
  var reg  = document.getElementById('cf-region').value;
  var desc = document.getElementById('cf-description').value.trim();

  if (!name) { showStatus('❌ Введіть назву компанії', 'error'); return; }
  if (!cat)  { showStatus('❌ Оберіть категорію', 'error'); return; }
  if (!reg)  { showStatus('❌ Оберіть регіон', 'error'); return; }
  if (!desc) { showStatus('❌ Введіть короткий опис', 'error'); return; }

  var lat = parseFloat(document.getElementById('cf-lat').value) || 0;
  var lng = parseFloat(document.getElementById('cf-lng').value) || 0;

  var tagsRaw     = document.getElementById('cf-tags').value;
  var productsRaw = document.getElementById('cf-products').value;
  var tags     = tagsRaw.split(',').map(function(t){ return t.trim(); }).filter(Boolean);
  var products = productsRaw.split(',').map(function(t){ return t.trim(); }).filter(Boolean);

  var now = new Date().toISOString();

  if (editingId) {
    /* Update existing */
    var idx = catalog.companies.findIndex(function(c){ return c.id === editingId; });
    if (idx === -1) { showStatus('❌ Компанію не знайдено', 'error'); return; }
    Object.assign(catalog.companies[idx], {
      name:             name,
      slug:             document.getElementById('cf-slug').value.trim() || slugify(name),
      category_id:      cat,
      region:           reg,
      location:         document.getElementById('cf-location').value.trim(),
      coordinates:      lat && lng ? [lat, lng] : catalog.companies[idx].coordinates,
      founded_year:     parseInt(document.getElementById('cf-founded').value) || 0,
      description:      desc,
      full_description: document.getElementById('cf-full-desc').value.trim(),
      website:          document.getElementById('cf-website').value.trim(),
      phone:            document.getElementById('cf-phone').value.trim(),
      email:            document.getElementById('cf-email').value.trim(),
      logo:             document.getElementById('cf-logo').value.trim(),
      social: {
        telegram:  document.getElementById('cf-telegram').value.trim(),
        instagram: document.getElementById('cf-instagram').value.trim(),
        facebook:  document.getElementById('cf-facebook').value.trim()
      },
      tags:     tags,
      products: products,
      status:   document.getElementById('cf-status').value,
      featured: document.getElementById('cf-featured').checked,
      updated_at: now
    });
    var ok = await saveCatalog('📋 Update company: ' + name);
    if (ok) { hideCompanyForm(); renderCompanies(); }
  } else {
    /* Create new */
    var maxNum = catalog.companies.reduce(function(m, c) {
      var n = parseInt((c.id || '').split('-').pop());
      return isNaN(n) ? m : Math.max(m, n);
    }, 0);
    var newId = 'hemp-ua-' + String(maxNum + 1).padStart(3, '0');
    var newCompany = {
      id:               newId,
      slug:             document.getElementById('cf-slug').value.trim() || slugify(name),
      name:             name,
      category_id:      cat,
      region:           reg,
      location:         document.getElementById('cf-location').value.trim(),
      coordinates:      lat && lng ? [lat, lng] : [],
      founded_year:     parseInt(document.getElementById('cf-founded').value) || 0,
      description:      desc,
      full_description: document.getElementById('cf-full-desc').value.trim(),
      website:          document.getElementById('cf-website').value.trim(),
      phone:            document.getElementById('cf-phone').value.trim(),
      email:            document.getElementById('cf-email').value.trim(),
      logo:             document.getElementById('cf-logo').value.trim(),
      social: {
        telegram:  document.getElementById('cf-telegram').value.trim(),
        instagram: document.getElementById('cf-instagram').value.trim(),
        facebook:  document.getElementById('cf-facebook').value.trim()
      },
      tags:     tags,
      products: products,
      status:   document.getElementById('cf-status').value,
      featured: document.getElementById('cf-featured').checked,
      added_at:   now,
      updated_at: now
    };
    catalog.companies.push(newCompany);
    var ok = await saveCatalog('📋 Add company: ' + name);
    if (ok) { hideCompanyForm(); renderCompanies(); }
  }
};

/* ---- Delete company ---- */
window.deleteCompany = async function(id, name) {
  if (!confirm('Видалити компанію "' + name + '"?\nЦю дію не можна скасувати.')) return;
  catalog.companies = catalog.companies.filter(function(c){ return c.id !== id; });
  var ok = await saveCatalog('🗑️ Delete company: ' + name);
  if (ok) renderCompanies();
};

/* ---- Deploy ---- */
window.triggerDeploy = async function() {
  if (!catToken) { showStatus('❌ Потрібен GitHub Token', 'error'); return; }
  try {
    await ghApi('POST', '/actions/workflows/moderate.yml/dispatches', { ref: 'main' });
    showStatus('🚀 Деплой запущено', 'ok');
  } catch(e) {
    showStatus('❌ Помилка деплою: ' + e.message, 'error');
  }
};

/* ---- Init ---- */
function init() {
  loadCatalog();
}

/* ---- Auto-auth from localStorage ---- */
(function() {
  var saved = localStorage.getItem('konopla_admin_key');
  if (!saved) return;
  sha256(saved).then(function(hash) {
    if (hash !== ADMIN_KEY_HASH) return;
    catKey = saved;
    catToken = localStorage.getItem('konopla_gh_token') || '';
    document.getElementById('cat-auth').style.display = 'none';
    document.getElementById('cat-panel').style.display = 'block';
    if (!catToken) document.getElementById('cat-pat-setup').style.display = 'flex';
    init();
  });
})();

})();
