baseURL = "https://konopla.ua/"
languageCode = "uk"
title = "KONOPLA.UA — Новини промислових конопель"
defaultContentLanguage = "uk"
buildDrafts = false

# Pagination
[pagination]
  pagerSize = 9

[params]
  description = "Konopla.ua — еко-портал промислових конопель України. Інноваційні технології, зелений бізнес та свідоме виробництво: від текстилю і будівництва до біопластику. З повагою до природи. З любов'ю до життя."
  author = "KONOPLA.UA"
  dateFormat = "2 January 2006"
  telegram = "https://t.me/uakonopla"
  threads = "https://www.threads.net/@konopla.ua"
  admin_key_hash = "2738babb7ac0919565144b506470c0d84356b9ce14f367fb81b798528a4511be"
  github_repo = "miakutikov/konopla"
  googleAnalytics = "G-XPRY9YLDBD"
  # Google Search Console — розкоментуй і встав свій verification token:
  # googleSiteVerification = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # Bing Webmaster Tools — розкоментуй і встав свій verification token:
  # bingVerification = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[taxonomies]
  category = "categories"
  # tag = "tags" — вимкнено: 186 унікальних тегів генерували ~186 порожніх сторінок у sitemap

# Sitemap
[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

# Related content (for "similar articles" in sidebar)
[related]
  includeNewer = true
  threshold = 60
  toLower = true
  [[related.indices]]
    name = "categories"
    weight = 100
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10
