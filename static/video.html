<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Відео</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px 16px; min-height: 100vh; }
  .video-wrap { width: 100%; max-width: 960px; }
  .video-container { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; }
  .video-container iframe,
  .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; background: #111; }
  .status { color: #aaa; text-align: center; padding: 40px 16px; font-family: sans-serif; font-size: 14px; line-height: 1.6; }
  .status a { color: #7af; }
</style>
</head>
<body>

<!-- Відео 1: Google Drive -->
<div class="video-wrap">
  <div class="video-container">
    <iframe src="https://drive.google.com/file/d/1LCjggYI9wGt6EdU1Ktq_nbGHMG8i6Nlg/preview"
      allowfullscreen allow="encrypted-media *;"></iframe>
  </div>
</div>

<!-- Відео 2: YouTube через Piped HLS-проксі -->
<div class="video-wrap">
  <div class="video-container" id="yt-container">
    <div class="status" id="yt-status">Завантаження відео…</div>
  </div>
</div>

<script>
(function () {
  var VIDEO_ID = 'viCMobNeaPY';
  var APIS = [
    'https://pipedapi.kavin.rocks',
    'https://piped.adminforge.de/api',
    'https://piped.privacydev.net/api',
    'https://pipedapi.in.projectsegfau.lt'
  ];
  var TIMEOUT_MS = 7000;
  var container = document.getElementById('yt-container');
  var status = document.getElementById('yt-status');

  function setStatus(html) {
    if (status) status.innerHTML = html;
  }

  function showFallback() {
    setStatus('Відео тимчасово недоступне.<br>' +
      '<a href="https://piped.kavin.rocks/watch?v=' + VIDEO_ID + '" target="_blank" rel="noopener">Дивитись на Piped ↗</a>');
  }

  function playHls(hlsUrl) {
    var video = document.createElement('video');
    video.controls = true;
    video.preload = 'metadata';
    video.setAttribute('playsinline', '');

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari / iOS — нативна підтримка HLS
      video.src = hlsUrl;
      mountVideo(video);
    } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      var hls = new Hls({ enableWorker: false });
      hls.loadSource(hlsUrl);
      hls.attachMedia(video);
      mountVideo(video);
    } else {
      showFallback();
    }
  }

  function mountVideo(video) {
    container.innerHTML = '';
    container.appendChild(video);
  }

  function fetchWithTimeout(url) {
    var ctrl = new AbortController();
    var id = setTimeout(function () { ctrl.abort(); }, TIMEOUT_MS);
    return fetch(url, { signal: ctrl.signal }).finally(function () { clearTimeout(id); });
  }

  function tryApi(idx) {
    if (idx >= APIS.length) { showFallback(); return; }
    setStatus('Завантаження відео… (' + (idx + 1) + '/' + APIS.length + ')');
    fetchWithTimeout(APIS[idx] + '/streams/' + VIDEO_ID)
      .then(function (r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
      .then(function (data) {
        // Використовуємо HLS-проксі Piped — трафік іде через їхній сервер, не YouTube CDN
        var hlsUrl = data.hls;
        if (hlsUrl) {
          playHls(hlsUrl);
        } else {
          tryApi(idx + 1);
        }
      })
      .catch(function (e) {
        console.warn('Piped API ' + APIS[idx] + ' failed:', e);
        tryApi(idx + 1);
      });
  }

  tryApi(0);
})();
</script>
</body>
</html>
