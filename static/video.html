<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Відео</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .video-wrap { width: 100%; max-width: 960px; padding: 0 16px; }
  .video-container { left: 0; width: 100%; height: 0; position: relative; padding-bottom: 56.25%; }
  .video-container iframe { top: 0; left: 0; width: 100%; height: 100%; position: absolute; border: 0; }
</style>
</head>
<body>
<div class="video-wrap">
  <div class="video-container">
    <iframe id="vi" src="https://yewtu.be/embed/viCMobNeaPY"
      allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
  </div>
</div>
<script>
(function() {
  var instances = [
    'yewtu.be',
    'inv.nadeko.net',
    'invidious.privacydev.net',
    'iv.datura.network'
  ];
  var idx = 0;
  var iframe = document.getElementById('vi');
  var vid = 'viCMobNeaPY';

  function next() {
    idx++;
    if (idx < instances.length) {
      iframe.src = 'https://' + instances[idx] + '/embed/' + vid;
    }
  }

  iframe.addEventListener('error', next);

  // Якщо iframe завантажився, але показав сторінку помилки — пробуємо через 4с
  iframe.addEventListener('load', function() {
    var timer = setTimeout(function() {
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc || doc.title === '' || doc.body.innerHTML === '') next();
      } catch(e) {
        // cross-origin — значить сторінка завантажилась нормально
      }
    }, 4000);
    iframe.addEventListener('load', function() { clearTimeout(timer); }, { once: true });
  }, { once: true });
})();
</script>
</body>
</html>
