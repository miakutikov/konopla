<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Відео</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px 16px; min-height: 100vh; }
  .video-wrap { width: 100%; max-width: 960px; }
  .video-container { width: 100%; height: 0; position: relative; padding-bottom: 56.25%; }
  .video-container iframe,
  .video-container video { top: 0; left: 0; width: 100%; height: 100%; position: absolute; border: 0; background: #111; }
  .fallback { color: #aaa; text-align: center; padding: 40px 0; font-family: sans-serif; font-size: 14px; }
  .fallback a { color: #7af; }
</style>
</head>
<body>

<!-- Відео 1: Google Drive -->
<div class="video-wrap">
  <div class="video-container">
    <iframe src="https://drive.google.com/file/d/1LCjggYI9wGt6EdU1Ktq_nbGHMG8i6Nlg/preview"
      allowfullscreen allow="encrypted-media *;"></iframe>
  </div>
</div>

<!-- Відео 2: YouTube через Piped API -->
<div class="video-wrap">
  <div class="video-container" id="yt-container">
    <div class="fallback" id="yt-loading">Завантаження відео…</div>
  </div>
</div>

<script>
(function () {
  var VIDEO_ID = 'viCMobNeaPY';
  var APIS = [
    'https://pipedapi.kavin.rocks',
    'https://piped.adminforge.de/api',
    'https://piped.privacydev.net/api'
  ];
  var container = document.getElementById('yt-container');

  function showFallback() {
    container.innerHTML =
      '<div class="fallback">Не вдалося завантажити відео.<br>' +
      '<a href="https://piped.kavin.rocks/watch?v=' + VIDEO_ID + '" target="_blank" rel="noopener">Дивитись на Piped ↗</a></div>';
  }

  function tryApi(idx) {
    if (idx >= APIS.length) { showFallback(); return; }
    fetch(APIS[idx] + '/streams/' + VIDEO_ID)
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) {
        var streams = (data.videoStreams || data.streams || []);
        // Знаходимо найкращий MP4 зі звуком (не videoOnly)
        var best = null;
        streams.forEach(function (s) {
          if (s.videoOnly) return;
          if (!s.mimeType || s.mimeType.indexOf('video/mp4') === -1) return;
          if (!best || (s.height || 0) > (best.height || 0)) best = s;
        });
        if (!best) { tryApi(idx + 1); return; }
        var video = document.createElement('video');
        video.controls = true;
        video.preload = 'metadata';
        video.src = best.url;
        video.onerror = function () { tryApi(idx + 1); };
        container.innerHTML = '';
        container.appendChild(video);
      })
      .catch(function () { tryApi(idx + 1); });
  }

  tryApi(0);
})();
</script>
</body>
</html>
