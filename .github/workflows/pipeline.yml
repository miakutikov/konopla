name: KONOPLA.UA News Pipeline

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Дія'
        type: choice
        options: [discover, process, deploy]
        default: discover
      region:
        description: 'Які джерела сканувати'
        type: choice
        options: [all, global, ua]
        default: all
      candidate_ids:
        description: 'ID кандидатів для обробки (через кому)'
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pipeline"
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        if: github.event.inputs.action != 'deploy'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: github.event.inputs.action != 'deploy'
        run: pip install -r requirements.txt

      - name: Run pipeline
        if: github.event.inputs.action != 'deploy'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          PYTHONIOENCODING: utf-8
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          ACTION="${{ github.event.inputs.action || 'discover' }}"
          REGION="${{ github.event.inputs.region || 'all' }}"
          IDS="${{ github.event.inputs.candidate_ids || '' }}"
          if [ "$ACTION" = "process" ] && [ -n "$IDS" ]; then
            python scripts/main.py --action process --ids "$IDS" --region "$REGION"
          else
            python scripts/main.py --action discover --region "$REGION"
          fi

      - name: Commit changes
        if: github.event.inputs.action != 'deploy'
        id: commit
        run: |
          git config user.name "Konopla Bot"
          git config user.email "bot@konopla.ua"
          git add content/news/ data/ static/images/generated/ || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            ACTION="${{ github.event.inputs.action || 'discover' }}"
            if [ "$ACTION" = "process" ]; then
              git commit -m "📋 New draft articles $(date -u +'%Y-%m-%d %H:%M UTC')"
            else
              git commit -m "📡 Updated candidates $(date -u +'%Y-%m-%d %H:%M UTC')"
            fi
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), pulling and retrying..."
            git pull --rebase -X theirs || {
              echo "Rebase conflict, aborting rebase and merging..."
              git rebase --abort
              git pull --no-edit -X theirs
            }
          done

      - name: Setup Hugo
        if: github.event.inputs.action == 'deploy' || (github.event.inputs.action == 'process' && steps.commit.outputs.changed == 'true')
        run: |
          HUGO_VERSION=$(curl -s https://api.github.com/repos/gohugoio/hugo/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb

      - name: Build Hugo site
        if: github.event.inputs.action == 'deploy' || (github.event.inputs.action == 'process' && steps.commit.outputs.changed == 'true')
        run: hugo --minify

      - name: Setup Pages
        if: github.event.inputs.action == 'deploy' || (github.event.inputs.action == 'process' && steps.commit.outputs.changed == 'true')
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: github.event.inputs.action == 'deploy' || (github.event.inputs.action == 'process' && steps.commit.outputs.changed == 'true')
        uses: actions/upload-pages-artifact@v4
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        if: github.event.inputs.action == 'deploy' || (github.event.inputs.action == 'process' && steps.commit.outputs.changed == 'true')
        id: deployment
        uses: actions/deploy-pages@v4
